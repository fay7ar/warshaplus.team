  <style>
    * {
      -webkit-tap-highlight-color: transparent;
    }
    
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    .animate-slideIn {
      animation: slideIn 0.3s ease-out forwards;
    }
    .message-bubble-sent {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border-radius: 20px 20px 5px 20px;
      max-width: 85%;
      margin-left: auto;
    }
    .message-bubble-received {
      background: #f3f4f6;
      border-radius: 20px 20px 20px 5px;
      max-width: 85%;
    }
    .chat-image {
      max-width: 180px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .chat-image:hover {
      transform: scale(1.02);
    }
    .message-notification {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: linear-gradient(135deg, #3b82f6, #1e40af);
      color: white;
      padding: 12px 16px;
      border-radius: 50px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 1000;
      cursor: pointer;
      animation: slideIn 0.3s ease-out, bounce 0.5s ease-in-out 0.2s;
      font-weight: bold;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .message-notification:hover {
      transform: scale(1.02);
      background: linear-gradient(135deg, #2563eb, #1e3a8a);
    }
    .notification-badge {
      background-color: #ef4444;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      animation: bounce 0.5s ease-in-out;
    }
    .message-indicator {
      background-color: #ef4444;
      color: white;
      border-radius: 50%;
      width: 10px;
      height: 10px;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }
    .unread-highlight {
      background-color: #dbeafe;
      transition: background-color 0.3s;
    }
    
    @media (max-width: 768px) {
      body {
        padding: 8px !important;
      }
      .cars-table-responsive {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .cars-table-responsive table {
        min-width: 700px;
      }
      .add-car-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .image-grid-mobile {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .chat-modal-mobile {
        flex-direction: column;
      }
      .chat-list-mobile {
        width: 100%;
        max-height: 200px;
        border-left: none;
        border-bottom: 1px solid #e5e7eb;
      }
      .chat-window-mobile {
        width: 100%;
        height: calc(100% - 200px);
      }
      .action-buttons {
        flex-direction: column;
        gap: 8px;
      }
      th, td {
        font-size: 14px;
        padding: 10px 6px !important;
      }
      .message-notification {
        left: 16px;
        right: 16px;
        bottom: 16px;
      }
      .sms-btn-mobile {
        font-size: 11px;
        padding: 4px 6px;
      }
    }
    
    @media (max-width: 480px) {
      th, td {
        font-size: 12px;
        padding: 8px 4px !important;
      }
      button {
        font-size: 14px;
      }
      input, select {
        font-size: 16px !important;
      }
      .message-bubble-sent, .message-bubble-received {
        max-width: 90%;
      }
    }
    
    body {
      overflow-x: hidden;
    }
    .overflow-x-auto {
      -webkit-overflow-scrolling: touch;
    }
    .modal-content {
      max-height: 85vh;
      overflow-y: auto;
    }
    .sms-icon {
      transition: all 0.2s ease;
    }
    .sms-icon:hover {
      transform: scale(1.1);
    }
    /* تنسيق مودال اختيار وسيلة الإرسال */

      backdrop-filter: blur(4px);
    }
    .choice-card {
      transition: all 0.2s;
    }
    .choice-card:hover {
      transform: scale(1.02);
    }

  <script>
    let currentWorkshopId = null;
    let currentCarKey = null;
    let currentImageType = null;
    let selectedChatCar = null;
    let lastUnreadCount = 0;
    const APP_DOWNLOAD_LINK = "https://fay7ar.github.io/warshaplus.download/";
    let pendingCarData = null; // لتخزين بيانات السيارة لحين اختيار وسيلة الإرسال

    // دالة مساعدة لاستخراج رقم الورشة واسمها
    async function getWorkshopPrefix(workshopId) {
      const workshopRef = db.ref(`التصنيفات/${workshopId}`);
      const snapshot = await workshopRef.once('value');
      const workshop = snapshot.val();
      if (workshop && workshop.prefix) {
        return workshop.prefix;
      } else {
        const allWorkshopsSnapshot = await db.ref('التصنيفات').once('value');
        const workshops = allWorkshopsSnapshot.val() || {};
        let maxUsed = 0;
        for (let id in workshops) {
          const w = workshops[id];
          if (w && w.prefix && typeof w.prefix === 'number') {
            if (w.prefix > maxUsed) maxUsed = w.prefix;
          }
        }
        let newPrefix = maxUsed + 1;
        if (newPrefix > 999) newPrefix = 1;
        await workshopRef.update({ prefix: newPrefix, name: workshop?.name || `ورشة ${newPrefix}` });
        return newPrefix;
      }
    }

    async function generateUniquePassword(workshopId) {
      const carsRef = db.ref(`التصنيفات/${workshopId}/cars`);
      const snapshot = await carsRef.once('value');
      const cars = snapshot.val() || {};
      const workshopPrefix = await getWorkshopPrefix(workshopId);
      let maxSeq = 0;
      for (let key in cars) {
        let pass = cars[key].passwordCar;
        if (pass && pass.length === 4 && !isNaN(parseInt(pass))) {
          const prefixFromPass = parseInt(pass.charAt(0));
          if (prefixFromPass === workshopPrefix) {
            let num = parseInt(pass);
            if (num > maxSeq) maxSeq = num;
          }
        }
      }
      let baseNumber = workshopPrefix * 1000;
      let newNumber = baseNumber + 1;
      if (maxSeq >= baseNumber + 1) newNumber = maxSeq + 1;
      let maxAllowed = baseNumber + 999;
      if (newNumber > maxAllowed) newNumber = baseNumber + 1;
      return newNumber.toString();
    }

    function loginToWorkshop() {
        const id = document.getElementById("workshopIdInput").value.trim();
        if (!id) { showAlert('يرجى إدخال الرقم التعريفي', 'error'); return; }
        db.ref("التصنيفات/" + id).once("value", snap => {
            const w = snap.val();
            if (w) {
                currentWorkshopId = id;
                document.getElementById("loginSection").classList.add("hidden");
                document.getElementById("carsDiv").classList.remove("hidden");
                document.getElementById("catTitle").innerText = ` ورشة: ${w.name}`;
                loadCars();
                listenForUnreadMessages();
                showAlert(`مرحباً بك في ورشة ${w.name}`, 'success');
            } else { showAlert("الرقم التعريفي غير صحيح", 'error'); }
        });
    }

    async function addCar(){
      const model = document.getElementById("carModel").value.trim();
      const number = document.getElementById("carNumber").value.trim();
      const phone = document.getElementById("carPhone").value.trim();
      const date = document.getElementById("carDate").value;
      if(!model || !number || !date) {
        showAlert("الرجاء إكمال جميع البيانات (نوع السيارة، رقمها، التاريخ)", 'error');
        return;
      }
      if(phone && !/^[0-9]{8,15}$/.test(phone.replace(/[^0-9]/g, ''))) {
        showAlert("رقم الهاتف يجب أن يحتوي على أرقام فقط (8-15 رقم)", 'error');
        return;
      }
      const carPass = await generateUniquePassword(currentWorkshopId);
      db.ref(`التصنيفات/${currentWorkshopId}/cars`).push().set({
          model, number, phone: phone || "", date, status: "قيد الانتظار", passwordCar: carPass,
          images: { waiting: "", maintenance: "", ready: "" },
          chat: { adminRead: true, userRead: true }
      }).then(() => {
          showAlert(`تمت إضافة السيارة بنجاح\nكلمة السر: ${carPass}`, 'success');
          document.getElementById("carModel").value = ""; 
          document.getElementById("carNumber").value = "";
          document.getElementById("carPhone").value = "";
          document.getElementById("carDate").value = "";
      }).catch(error => { console.error(error); showAlert("فشل في إضافة السيارة", 'error'); });
    }

    function loadCars(){
      db.ref(`التصنيفات/${currentWorkshopId}/cars`).on("value", snap => {
        const data = snap.val() || {};
        const table = document.getElementById("carsTable");
        table.innerHTML = "";
        if (Object.keys(data).length === 0) {
          const tr = document.createElement("tr");
          tr.innerHTML = '<td colspan="9" class="p-6 text-gray-400 text-center">لا توجد سيارات مسجلة</td>';
          table.appendChild(tr);
          return;
        }
        for(let key in data){
          const car = data[key];
          const images = car.images || { waiting: "", maintenance: "", ready: "" };
          const chatData = car.chat || {};
          const hasUnread = (chatData.userRead === false && chatData.lastMessage?.from === 'user');
          const phoneNumber = car.phone || "";
          const tr = document.createElement("tr");
          tr.className = `border-b hover:bg-gray-50 transition ${hasUnread ? 'unread-highlight' : ''}`;
          tr.innerHTML = `
            <td class="p-2 md:p-3 font-mono font-bold text-red-500 text-sm">${car.passwordCar}</td>
            <td class="p-2 md:p-3 text-sm">${car.model}</td>
            <td class="p-2 md:p-3 font-bold text-sm">${car.number} ${hasUnread ? '<span class="message-indicator"></span>' : ''}</td>
            <td class="p-2 md:p-3 text-sm dir-ltr" style="direction: ltr;">${phoneNumber ? phoneNumber : '—'}</td>
            <td class="p-2 md:p-3">
              <select onchange="updateStatus('${key}', this.value)" class="border rounded p-1 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <option ${car.status === "قيد الانتظار" ? "selected" : ""}>قيد الانتظار</option>
                <option ${car.status === "قيد الصيانة" ? "selected" : ""}>قيد الصيانة</option>
                <option ${car.status === "جاهزة" ? "selected" : ""}>جاهزة</option>
              </select>
            </td>
            <td class="p-2 md:p-3">
              <div class="flex gap-1 justify-center">
                <span class="inline-block w-3 h-3 rounded-full ${images.waiting ? 'bg-green-500' : 'bg-gray-300'}" title="${images.waiting ? 'توجد صورة انتظار' : 'لا توجد صورة'}"></span>
                <span class="inline-block w-3 h-3 rounded-full ${images.maintenance ? 'bg-green-500' : 'bg-gray-300'}" title="${images.maintenance ? 'توجد صورة صيانة' : 'لا توجد صورة'}"></span>
                <span class="inline-block w-3 h-3 rounded-full ${images.ready ? 'bg-green-500' : 'bg-gray-300'}" title="${images.ready ? 'توجد صورة جاهزة' : 'لا توجد صورة'}"></span>
              </div>
              <button onclick="openImageModal('${key}', '${car.model} - ${car.number}')" class="text-blue-500 text-xs hover:underline mt-1">📸 إدارة</button>
            </td>
            <td class="p-2 md:p-3">
              <button onclick="openChatForCar('${key}', '${car.number}')" class="text-green-600 hover:text-green-700 text-xs flex items-center gap-1">
                <i class="ph ph-chat text-sm"></i> دردشة ${hasUnread ? '📩' : ''}
              </button>
            </td>
            <td class="p-2 md:p-3">
              ${phoneNumber ? `<button onclick="showSendChoice('${key}', '${car.number}', '${phoneNumber}', '${car.model}', '${car.passwordCar}', '${car.status}')" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 text-xs px-2 py-1 rounded-full transition flex items-center gap-1 mx-auto"><i class="ph ph-share-network text-xs"></i> إرسال</button>` : '<span class="text-gray-300 text-xs">لا يوجد رقم</span>'}
            </td>
            <td class="p-2 md:p-3">
              <button onclick="deleteCar('${key}')" class="text-red-400 hover:text-red-600 text-sm transition">حذف</button>
            </td>
          `;
          table.appendChild(tr);
        }
      });
    }

    // دالة عرض مودال اختيار وسيلة الإرسال
    function showSendChoice(carKey, carNumber, phoneNumber, carModel, password, status) {
      if(!phoneNumber) return;
      pendingCarData = { carKey, carNumber, phoneNumber, carModel, password, status };
      const modal = document.getElementById("sendChoiceModal");
      modal.classList.remove("hidden");
      
      // ربط الأزرار ديناميكياً (إزالة المستمعين السابقين لمنع التكرار)
      const whatsappBtn = document.getElementById("whatsappChoiceBtn");
      const smsBtn = document.getElementById("smsChoiceBtn");
      const newWhatsappBtn = whatsappBtn.cloneNode(true);
      const newSmsBtn = smsBtn.cloneNode(true);
      whatsappBtn.parentNode.replaceChild(newWhatsappBtn, whatsappBtn);
      smsBtn.parentNode.replaceChild(newSmsBtn, smsBtn);
      
      newWhatsappBtn.onclick = () => {
        sendViaWhatsApp(pendingCarData);
        closeSendChoiceModal();
      };
      newSmsBtn.onclick = () => {
        sendViaSMS(pendingCarData);
        closeSendChoiceModal();
      };
    }
    
    function closeSendChoiceModal() {
      document.getElementById("sendChoiceModal").classList.add("hidden");
      pendingCarData = null;
    }
    
    // بناء رسالة موحدة حسب الطلب: مرحباً بك في "اسم الورشة" بالتعاون مع ورشة + ...
    async function buildFormattedMessage(workshopName, carData) {
      const statusText = carData.status === "جاهزة" ? "جاهزة للتسليم 🎉" : (carData.status === "قيد الصيانة" ? "قيد الصيانة 🔧" : "قيد الانتظار ⏳");
      return `مرحباً بك في "${workshopName}" بالتعاون مع ورشة + 

بيانات سيارتك:
🚗 رقم السيارة: ${carData.carNumber}
🏷️ الموديل: ${carData.carModel}
🔑 كلمة السر: ${carData.password}
📌 الحالة: ${statusText}

لتحميل تطبيق ورشة+
لمتابعة حالة سيارتك والتواصل معنا:
${APP_DOWNLOAD_LINK}

شكراً لثقتكم`;
    }
    
    async function sendViaWhatsApp(carData) {
      try {
        const workshopRef = db.ref(`التصنيفات/${currentWorkshopId}`);
        const snap = await workshopRef.once('value');
        const workshop = snap.val();
        const workshopName = workshop?.name || "الورشة";
        const message = await buildFormattedMessage(workshopName, carData);
        const encodedMsg = encodeURIComponent(message);
        const cleanPhone = carData.phoneNumber.replace(/[^0-9]/g, '');
        // محاولة فتح واتساب مباشرة (للويب والجوال)
        const whatsappUrl = `https://wa.me/${cleanPhone}?text=${encodedMsg}`;
        window.open(whatsappUrl, '_blank');
        showAlert(`تم فتح محادثة واتساب مع ${carData.carNumber}`, 'success');
      } catch(e) {
        showAlert("حدث خطأ في الإرسال عبر واتساب", 'error');
      }
    }
    
    async function sendViaSMS(carData) {
      try {
        const workshopRef = db.ref(`التصنيفات/${currentWorkshopId}`);
        const snap = await workshopRef.once('value');
        const workshop = snap.val();
        const workshopName = workshop?.name || "الورشة";
        const message = await buildFormattedMessage(workshopName, carData);
        const encodedMsg = encodeURIComponent(message);
        const cleanPhone = carData.phoneNumber.replace(/[^0-9]/g, '');
        const smsUrl = `sms:${cleanPhone}?body=${encodedMsg}`;
        window.location.href = smsUrl;
        showAlert(`تم فتح تطبيق الرسائل لإرسال البيانات إلى ${carData.carNumber}`, 'success');
      } catch(e) {
        showAlert("حدث خطأ في الإرسال عبر SMS", 'error');
      }
    }

    function updateStatus(key, newStatus){
      db.ref(`التصنيفات/${currentWorkshopId}/cars/${key}`).update({status: newStatus})
        .then(() => showAlert('تم تحديث الحالة بنجاح', 'success'))
        .catch(() => showAlert('فشل في تحديث الحالة', 'error'));
    }

    function deleteCar(key){
      if(confirm("❌ هل أنت متأكد من حذف السيارة؟")) {
        db.ref(`التصنيفات/${currentWorkshopId}/cars/${key}`).remove()
          .then(() => showAlert('تم حذف السيارة بنجاح', 'success'))
          .catch(() => showAlert('فشل في حذف السيارة', 'error'));
      }
    }

    function openImageModal(carKey, carInfo) {
      currentCarKey = carKey;
      document.getElementById("modalCarInfo").innerText = carInfo;
      db.ref(`التصنيفات/${currentWorkshopId}/cars/${carKey}/images`).once("value", snap => {
        const images = snap.val() || { waiting: "", maintenance: "", ready: "" };
        ['waiting', 'maintenance', 'ready'].forEach(type => {
          const imgElem = document.getElementById(`${type}Image`);
          const noElem = document.getElementById(`no${type.charAt(0).toUpperCase() + type.slice(1)}Image`);
          if (images[type]) {
            imgElem.src = images[type];
            imgElem.classList.remove("hidden");
            noElem.classList.add("hidden");
          } else {
            imgElem.classList.add("hidden");
            noElem.classList.remove("hidden");
          }
        });
      });
      document.getElementById("imageModal").classList.remove("hidden");
    }

    function closeImageModal() { document.getElementById("imageModal").classList.add("hidden"); currentCarKey = null; currentImageType = null; }
    function uploadImage(type) { currentImageType = type; document.getElementById("fileInput").click(); }
    function handleImageUpload(event) {
      const file = event.target.files[0];
      if (!file || !currentCarKey || !currentImageType) return;
      if (file.size > 5 * 1024 * 1024) { showAlert('حجم الصورة يجب أن يكون أقل من 5 ميجابايت', 'error'); return; }
      const reader = new FileReader();
      reader.onload = function(e) {
        db.ref(`التصنيفات/${currentWorkshopId}/cars/${currentCarKey}/images/${currentImageType}`).set(e.target.result)
          .then(() => { showAlert("تم رفع الصورة بنجاح", 'success'); closeImageModal(); openImageModal(currentCarKey, document.getElementById("modalCarInfo").innerText); })
          .catch(() => showAlert("فشل في حفظ الصورة", 'error'));
      };
      reader.readAsDataURL(file);
    }
    function deleteImage(type) {
      if (!confirm(`❌ هل أنت متأكد من حذف الصورة؟`)) return;
      db.ref(`التصنيفات/${currentWorkshopId}/cars/${currentCarKey}/images/${type}`).set("")
        .then(() => { showAlert("تم حذف الصورة", 'success'); closeImageModal(); openImageModal(currentCarKey, document.getElementById("modalCarInfo").innerText); })
        .catch(() => showAlert("فشل في حذف الصورة", 'error'));
    }

    function openChatForCar(carKey, carNumber) {
      selectedChatCar = { key: carKey, number: carNumber };
      document.getElementById("selectedChatCar").innerText = `محادثة مع سيارة رقم: ${carNumber}`;
      db.ref(`التصنيفات/${currentWorkshopId}/cars/${carKey}/chat`).update({ adminRead: true });
      loadChatMessages(carKey);
      document.getElementById("chatModal").classList.remove("hidden");
      setTimeout(() => listenForUnreadMessages(), 500);
    }
    function openSupportMessages() { loadChatList(); document.getElementById("chatModal").classList.remove("hidden"); }
    function loadChatList() {
      db.ref(`التصنيفات/${currentWorkshopId}/cars`).once("value", snap => {
        const cars = snap.val() || {};
        const chatList = document.getElementById("chatList");
        chatList.innerHTML = "";
        for (let key in cars) {
          const car = cars[key];
          if (car.chat && Object.keys(car.chat).length > 0) {
            const messages = Object.values(car.chat).filter(msg => msg && typeof msg === 'object' && (msg.text || msg.image));
            const lastMsg = messages[messages.length - 1];
            const unread = car.chat.userRead === false && car.chat.lastMessage?.from === 'user';
            const div = document.createElement("div");
            div.className = `p-3 rounded-lg cursor-pointer hover:bg-blue-50 transition ${unread ? 'bg-blue-100 font-bold' : ''}`;
            div.onclick = () => openChatForCar(key, car.number);
            div.innerHTML = `<div class="flex justify-between items-center"><span class="font-bold text-sm">🚗 ${car.number}</span>${unread ? '<span class="bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">!</span>' : ''}</div><p class="text-xs text-gray-500 truncate">${lastMsg ? (lastMsg.text || '📷 صورة') : 'لا توجد رسائل'}</p>`;
            chatList.appendChild(div);
          }
        }
        if (chatList.children.length === 0) chatList.innerHTML = '<p class="text-center text-gray-400 py-8 text-sm">لا توجد محادثات حالياً</p>';
      });
    }
    function loadChatMessages(carKey) {
      const messagesDiv = document.getElementById("chatMessages");
      db.ref(`التصنيفات/${currentWorkshopId}/cars/${carKey}/chat`).on("value", snap => {
        const chat = snap.val() || {};
        messagesDiv.innerHTML = "";
        const messages = Object.entries(chat).filter(([key, value]) => key !== 'adminRead' && key !== 'userRead' && key !== 'lastMessage' && value && value.timestamp).sort((a, b) => a[1].timestamp - b[1].timestamp);
        for (let [msgKey, msg] of messages) {
          const div = document.createElement("div");
          div.className = `flex ${msg.from === 'admin' ? 'justify-start' : 'justify-end'} mb-3`;
          if (msg.image) {
            div.innerHTML = `<div class="${msg.from === 'admin' ? 'message-bubble-received' : 'message-bubble-sent'} p-2"><img src="${msg.image}" class="chat-image max-w-[150px] md:max-w-[180px] rounded-lg mb-1" onclick="openFullImage('${msg.image}')">${msg.text ? `<p class="mt-1 text-sm ${msg.from === 'admin' ? 'text-gray-700' : 'text-white'}">${msg.text}</p>` : ''}<p class="text-xs ${msg.from === 'admin' ? 'text-gray-500' : 'text-blue-100'} mt-1">${new Date(msg.timestamp).toLocaleTimeString('ar-EG')}</p></div>`;
          } else {
            div.innerHTML = `<div class="${msg.from === 'admin' ? 'message-bubble-received' : 'message-bubble-sent'} p-3"><p class="text-sm ${msg.from === 'admin' ? 'text-gray-700' : 'text-white'}">${msg.text}</p><p class="text-xs ${msg.from === 'admin' ? 'text-gray-500' : 'text-blue-100'} mt-1">${new Date(msg.timestamp).toLocaleTimeString('ar-EG')}</p></div>`;
          }
          messagesDiv.appendChild(div);
        }
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });
    }
    function sendMessage() {
      const text = document.getElementById("chatMessageInput").value.trim();
      if (!text || !selectedChatCar) return;
      const messageId = Date.now().toString();
      const message = { text, from: 'admin', timestamp: Date.now() };
      db.ref(`التصنيفات/${currentWorkshopId}/cars/${selectedChatCar.key}/chat/${messageId}`).set(message)
        .then(() => { db.ref(`التصنيفات/${currentWorkshopId}/cars/${selectedChatCar.key}/chat`).update({ lastMessage: message, adminRead: true, userRead: false }); document.getElementById("chatMessageInput").value = ""; })
        .catch(() => showAlert("فشل في إرسال الرسالة", 'error'));
    }
    function uploadChatImage() { document.getElementById("chatImageInput").click(); }
    function handleChatImageUpload(event) {
      const file = event.target.files[0];
      if (!file || !selectedChatCar) return;
      if (file.size > 5 * 1024 * 1024) { showAlert('حجم الصورة يجب أن يكون أقل من 5 ميجابايت', 'error'); return; }
      const reader = new FileReader();
      reader.onload = function(e) {
        const messageId = Date.now().toString();
        const message = { image: e.target.result, from: 'admin', timestamp: Date.now() };
        db.ref(`التصنيفات/${currentWorkshopId}/cars/${selectedChatCar.key}/chat/${messageId}`).set(message)
          .then(() => db.ref(`التصنيفات/${currentWorkshopId}/cars/${selectedChatCar.key}/chat`).update({ lastMessage: message, adminRead: true, userRead: false }))
          .catch(() => showAlert("فشل في إرسال الصورة", 'error'));
      };
      reader.readAsDataURL(file);
    }
    function listenForUnreadMessages() {
      if (!currentWorkshopId) return;
      db.ref(`التصنيفات/${currentWorkshopId}/cars`).on("value", snap => {
        const cars = snap.val() || {};
        let unreadCount = 0;
        for (let key in cars) {
          const car = cars[key];
          if (car.chat && car.chat.userRead === false && car.chat.lastMessage?.from === 'user') {
            unreadCount++;
          }
        }
        const badge = document.getElementById("unreadBadge");
        if (unreadCount > 0) { badge.classList.remove("hidden"); badge.innerText = unreadCount; } else { badge.classList.add("hidden"); }
        lastUnreadCount = unreadCount;
      });
    }
    function closeChatModal() { document.getElementById("chatModal").classList.add("hidden"); if (selectedChatCar) { db.ref(`التصنيفات/${currentWorkshopId}/cars/${selectedChatCar.key}/chat`).off(); } }
    function openFullImage(src) { document.getElementById("fullImage").src = src; document.getElementById("fullImageModal").classList.remove("hidden"); }
    function closeFullImage() { document.getElementById("fullImageModal").classList.add("hidden"); }
    function showAlert(message, type = 'success') {
      const alertDiv = document.createElement('div');
      alertDiv.className = `fixed top-4 left-4 right-4 p-4 rounded-xl shadow-2xl z-[100] animate-slideIn flex items-center gap-3 ${
        type === 'success' ? 'bg-green-500' : 
        type === 'error' ? 'bg-red-500' : 
        'bg-yellow-500'
      } text-white`;
      const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : '⚠️';
      alertDiv.innerHTML = `${icon} ${message}`;
      document.body.appendChild(alertDiv);
      setTimeout(() => {
        alertDiv.style.opacity = '0';
        alertDiv.style.transition = 'opacity 0.5s';
        setTimeout(() => alertDiv.remove(), 500);
      }, 3000);
    }

    window.onload = function() {
      const searchInput = document.getElementById("chatSearch");
      if (searchInput) { searchInput.addEventListener("input", function(e) { const searchTerm = e.target.value.toLowerCase(); const chatItems = document.querySelectorAll("#chatList > div"); chatItems.forEach(item => { const carNumber = item.querySelector("span")?.innerText || ""; item.style.display = carNumber.toLowerCase().includes(searchTerm) ? "" : "none"; }); }); }
    };
  </script>
</body>
</html>
